services:
  checklist:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: ${PROJECT_ROOT}/cmd/checklist/Dockerfile
    container_name: checklist
    environment:
      - HTTP_ADDR=:5050
      - HTTP_SHUTDOWN_TIMEOUT=${HTTP_SHUTDOWN_TIMEOUT}
      - POSTGRES_HOST=checklist-postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
      - LOGGER_LEVEL=${LOGGER_LEVEL}
      - LOGGER_FOLDER=/app/out/logs
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=user-actions
    depends_on:
      - kafka
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "5050:5050"
    restart: always
  
  checklist-postgres:
    image: postgres:18.3-bookworm
    container_name:  checklist-env-postgres
    environment: 
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always
  
  checklist-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: checklist-postgres-port-forwarder
    command: TCP-LISTEN:5432,reuseaddr,fork TCP:checklist-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - default

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"   # опционально, если хотите подключаться с хоста
    restart: always

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: always
  kafka-logger:
    build:
      context: ${PROJECT_ROOT}/internal/kafka_worker/Dockerfile         # предполагаем, что Dockerfile лежит в папке kafka-logger
    container_name: kafka-logger
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: user-actions        # должен совпадать с тем, что шлёт API
      LOG_FILE: /logs/actions.log      # путь к файлу логов внутри контейнера
    volumes:
      - ${PROJECT_ROOT}/out/logs:/logs # монтируем ту же папку, что и для API (или отдельную)
    restart: always